services:
  - type: web
    name: ovo-letters
    runtime: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
