services:
  - type: web
    name: ovo-letters
    runtime: node
    plan: starter
    buildCommand: "npm install"
    startCommand: "npm start"
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    envVars:
      - key: DB_PATH
        value: /var/data/db.json
    disk:
      name: ovo-data
      mountPath: /var/data
      sizeGB: 1
